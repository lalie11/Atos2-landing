<section id="stats">
  <div class="stats-grid">
    <div class="stat-card" appReveal *ngFor="let stat of stats">
      <div class="stat-number">{{ stat.number }}</div>
      <div class="stat-title">{{ stat.title }}</div>
      <div class="stat-text">{{ stat.text }}</div>
    </div>
  </div>
</section>
