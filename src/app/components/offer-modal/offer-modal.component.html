<div
  class="offer-modal"
  [class.active]="offersService.activeOffer() !== null"
  *ngIf="offersService.activeOffer() as offer"
  (click)="onBackdropClick($event)"
>
  <div class="offer-content">
    <span class="close-modal" (click)="close()">&times;</span>

    <h1>{{ offer.title }}</h1>
    <p>{{ offer.text }}</p>

    <div class="offer-box">
      <h3>Quelques cas d'usage&nbsp;:</h3>
      <ul>
        <li *ngFor="let service of offer.services">{{ service }}</li>
      </ul>
    </div>

    <div class="offer-partners" *ngIf="offer.partners.length">
      <h3>Partenaires concernés&nbsp;:</h3>
      <div class="offer-partners-list">
        <img
          *ngFor="let partner of offer.partners"
          [src]="'assets/images/' + partner"
          [alt]="partner"
          class="offer-partner-logo"
        />
      </div>
    </div>
  </div>
</div>
